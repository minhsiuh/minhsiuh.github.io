<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Min-Hsiu Hsieh</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --text-color: #333;
            --light-bg: #f8f9fa;
            --border-color: #e9ecef;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            margin: 0;
            background: var(--light-bg);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: white;
            padding: 40px 0 24px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .subtitle { opacity: 0.9; margin-top: 8px; }
        nav {
            background: white;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            display: block;
            padding: 16px 0;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
        }
        nav a.active, nav a:hover { color: var(--secondary-color); }
        main { padding: 48px 0; }
        .panel {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        .panel h2 { margin-top: 0; color: var(--primary-color); }
        .muted { color: #6c757d; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Blog</h1>
            <div class="subtitle">Notes, updates, and research reflections</div>
        </div>
    </header>
    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <div class="container">
            <section class="panel">
                <h2>Coming soon</h2>
                <p class="muted">This page is ready in the navigation menu. Content can be added next when you decide the blog structure and first posts.</p>
            </section>
        </div>
    </main>
</body>
</html>
