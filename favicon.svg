<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MH Quantum favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2f46"/>
      <stop offset="100%" stop-color="#2d5c88"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Quantum-like orbits -->
  <ellipse cx="32" cy="31" rx="20" ry="8" fill="none" stroke="#7ec8ff" stroke-width="2" opacity="0.9"/>
  <ellipse cx="32" cy="31" rx="20" ry="8" fill="none" stroke="#7ec8ff" stroke-width="2" opacity="0.55" transform="rotate(60 32 31)"/>
  <ellipse cx="32" cy="31" rx="20" ry="8" fill="none" stroke="#7ec8ff" stroke-width="2" opacity="0.55" transform="rotate(-60 32 31)"/>

  <!-- Nucleus -->
  <circle cx="32" cy="31" r="3.2" fill="#f4f9ff"/>

  <!-- MH monogram -->
  <text x="32" y="55" text-anchor="middle" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="700" fill="#eaf4ff">MH</text>
</svg>
